name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site artifact
        run: |
          mkdir -p dist
          cp index.html dist/
          cp script.js dist/
          cp styles.css dist/

      - name: List dist contents
        run: |
          echo "Contents of dist before upload:"
          ls -l dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed site is reachable
        run: |
          PAGE_URL="${{ steps.deployment.outputs.page_url }}"
          INDEX_URL="${PAGE_URL%/}/index.html"

          echo "Checking root URL: ${PAGE_URL}"
          ROOT_STATUS=$(curl --silent --show-error --location --retry 8 --retry-delay 5 --retry-connrefused --max-time 30 --output /dev/null --write-out "%{http_code}" "${PAGE_URL}")
          echo "Root status: ${ROOT_STATUS}"

          echo "Checking index URL: ${INDEX_URL}"
          INDEX_STATUS=$(curl --silent --show-error --location --retry 8 --retry-delay 5 --retry-connrefused --max-time 30 --output /dev/null --write-out "%{http_code}" "${INDEX_URL}")
          echo "Index status: ${INDEX_STATUS}"

          test "${ROOT_STATUS}" = "200"
          test "${INDEX_STATUS}" = "200"
